<!-- HERO -->
<section class="relative pt-24 md:pt-32 lg:pt-40 pb-20 lg:pb-28 px-4 md:px-8 overflow-hidden"
         style="background: linear-gradient(180deg, #080508 0%, #0a0a0a 100%);">
  <div class="absolute inset-0 opacity-15"
       style="background: radial-gradient(ellipse at 50% 0%, #531e10 0%, transparent 60%);"></div>
  <div class="relative z-10 max-w-7xl mx-auto text-center">
    <div class="flex items-center justify-center gap-3 mb-4">
      <span class="h-px w-12" style="background: #d3af67;"></span>
      <span class="text-xs tracking-[0.3em] uppercase" style="color: #d3af67;">Фото</span>
      <span class="h-px w-12" style="background: #d3af67;"></span>
    </div>
    <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-7xl xl:text-8xl font-light text-white mb-4"
        style="font-family: 'Cormorant Garamond', serif;">
      <span class="gradient-text">Галерея</span>
    </h1>
    <p class="text-white/50 max-w-xl mx-auto">
      Поринь в атмосферу готелю Клеопатра ще до приїзду
    </p>
  </div>
</section>

<!-- FILTERS -->
<section class="sticky top-16 md:top-20 lg:top-24 z-40 px-4 py-4 border-b"
         style="background: rgba(10,10,10,0.95); backdrop-filter: blur(16px); border-color: rgba(255,255,255,0.05);">
  <div class="max-w-7xl mx-auto flex flex-wrap gap-2 justify-center">
    @for (cat of categories; track cat.id) {
      <button
        class="px-5 py-2 rounded-full text-sm font-medium transition-all duration-300"
        [ngClass]="{
          'text-dark': activeCategory() === cat.id,
          'text-white/60 hover:text-white border border-white/10 hover:border-white/30': activeCategory() !== cat.id
        }"
        [style.background]="activeCategory() === cat.id ? 'linear-gradient(135deg, #d3af67, #e8c97c, #b8923d)' : 'transparent'"
        (click)="setCategory(cat.id)">
        {{ cat.label }}
      </button>
    }
  </div>
</section>

<!-- MASONRY GALLERY -->
<section class="py-16 lg:py-20 xl:py-24 px-4 md:px-8 lg:px-12 xl:px-16" style="background: #0a0a0a;">
  <div class="max-w-7xl mx-auto">
    <div class="columns-1 sm:columns-2 md:columns-3 lg:columns-4 xl:columns-5 2xl:columns-6 gap-3 sm:gap-4 lg:gap-5 xl:gap-6 space-y-3 sm:space-y-4 lg:space-y-5 xl:space-y-6">
      @for (item of filteredItems; track item.id; let i = $index) {
        <div class="break-inside-avoid mb-3 sm:mb-4 lg:mb-5 xl:mb-6 group relative overflow-hidden rounded-2xl cursor-pointer"
             appScrollAnimate (click)="openLightbox(i)">
          <img [src]="item.src"
               [alt]="item.alt"
               class="w-full object-cover transition-transform duration-500 group-hover:scale-110"
               loading="lazy"
               onerror="this.style.display='none'; this.parentElement.style.minHeight='200px'; this.parentElement.style.background='#1a1a1a'">

          <!-- Hover Overlay -->
          <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center"
               style="background: rgba(211,175,103,0.15); backdrop-filter: blur(2px);">
            <div class="w-12 h-12 rounded-full border-2 flex items-center justify-center"
                 style="border-color: #d3af67;">
              <svg class="w-5 h-5" style="color: #d3af67;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/>
              </svg>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>

<!-- LIGHTBOX -->
@if (lightboxIndex() >= 0) {
  <div
    class="fixed inset-0 z-[100] flex items-center justify-center p-4"
    style="background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);"
    (click)="closeLightbox()">

    <!-- Image Container -->
    <div class="relative max-w-5xl w-full max-h-[90vh]" (click)="$event.stopPropagation()">

      <img [src]="filteredItems[lightboxIndex()].src"
           [alt]="filteredItems[lightboxIndex()].alt"
           class="w-full h-auto max-h-[80vh] object-contain rounded-2xl">

      <!-- Caption -->
      <div class="text-center mt-3 text-white/50 text-sm">{{ filteredItems[lightboxIndex()].alt }}</div>

      <!-- Close -->
      <button
        class="absolute top-4 right-4 w-10 h-10 rounded-full border border-white/20 flex items-center justify-center text-white hover:bg-white/10 transition-all duration-300"
        (click)="closeLightbox()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

      <!-- Prev -->
      <button
        class="absolute left-2 sm:left-4 top-1/2 -translate-y-1/2 w-10 h-10 sm:w-12 sm:h-12 rounded-full border border-white/20 flex items-center justify-center text-white hover:bg-white/10 transition-all duration-300"
        (click)="prevImage()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>

      <!-- Next -->
      <button
        class="absolute right-2 sm:right-4 top-1/2 -translate-y-1/2 w-10 h-10 sm:w-12 sm:h-12 rounded-full border border-white/20 flex items-center justify-center text-white hover:bg-white/10 transition-all duration-300"
        (click)="nextImage()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </button>

      <!-- Counter -->
      <div class="absolute bottom-10 left-1/2 -translate-x-1/2 px-3 py-1 rounded-full text-xs text-white/50 border border-white/10">
        {{ lightboxIndex() + 1 }} / {{ filteredItems.length }}
      </div>
    </div>
  </div>
}
