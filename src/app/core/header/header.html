<header
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500"
  [ngClass]="{
    'bg-black/80 backdrop-blur-md border-b border-white/5 shadow-lg shadow-black/20': isScrolled(),
    'bg-transparent': !isScrolled()
  }">

  <div class="max-w-7xl mx-auto px-4 md:px-6 lg:px-8 xl:px-12">
    <div class="flex items-center justify-between h-14 sm:h-16 md:h-20 lg:h-24">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center group transition-opacity duration-300 hover:opacity-85" (click)="closeMenu()">
        <img src="logo.png" alt="Готель Клеопатра"
             class="h-9 sm:h-11 lg:h-14 w-auto transition-transform duration-300 group-hover:scale-105"
             style="filter: drop-shadow(0 0 8px rgba(211,175,103,0.25));">
      </a>

      <!-- Desktop Nav -->
      <nav class="hidden lg:flex items-center gap-1 xl:gap-2">
        @for (item of navItems(); track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="active-nav"
            class="relative px-4 py-2 xl:px-5 text-sm xl:text-base font-medium text-white/80 hover:text-white tracking-wide transition-all duration-300 group"
            style="font-family: 'Inter', sans-serif; letter-spacing: 0.05em;">
            {{ item.label }}
            <span class="absolute bottom-0 left-1/2 -translate-x-1/2 w-0 h-px transition-all duration-300 group-hover:w-4/5"
                  style="background: #d3af67;"></span>
          </a>
        }
      </nav>

      <!-- Phone + Lang switcher + CTA -->
      <div class="hidden md:flex items-center gap-4">
        <!-- Language Switcher -->
        <div class="flex items-center gap-1 text-xs">
          <button
            (click)="svc.setLang('uk')"
            class="px-1.5 py-0.5 rounded font-medium transition-all duration-200"
            [style.color]="svc.currentLang() === 'uk' ? '#d3af67' : 'rgba(255,255,255,0.4)'"
            [style.font-weight]="svc.currentLang() === 'uk' ? '600' : '400'">
            UA
          </button>
          <span style="color: rgba(255,255,255,0.2);">|</span>
          <button
            (click)="svc.setLang('en')"
            class="px-1.5 py-0.5 rounded font-medium transition-all duration-200"
            [style.color]="svc.currentLang() === 'en' ? '#d3af67' : 'rgba(255,255,255,0.4)'"
            [style.font-weight]="svc.currentLang() === 'en' ? '600' : '400'">
            EN
          </button>
          <span style="color: rgba(255,255,255,0.2);">|</span>
          <button
            (click)="svc.setLang('pl')"
            class="px-1.5 py-0.5 rounded font-medium transition-all duration-200"
            [style.color]="svc.currentLang() === 'pl' ? '#d3af67' : 'rgba(255,255,255,0.4)'"
            [style.font-weight]="svc.currentLang() === 'pl' ? '600' : '400'">
            PL
          </button>
        </div>

        <a href="tel:+380384991652" class="text-sm font-medium transition-colors duration-300 hover:opacity-80"
           style="color: #d3af67; font-family: 'Inter', sans-serif;">
          +380384991652
        </a>
      </div>

      <!-- Mobile Hamburger -->
      <button
        class="lg:hidden flex flex-col justify-center items-center w-10 h-10 gap-1.5 transition-all duration-300"
        (click)="toggleMenu()"
        aria-label="Меню">
        <span class="block w-6 h-px bg-white transition-all duration-300"
              [ngClass]="{'rotate-45 translate-y-2': mobileMenuOpen()}"></span>
        <span class="block w-6 h-px bg-white transition-all duration-300"
              [ngClass]="{'opacity-0 scale-x-0': mobileMenuOpen()}"></span>
        <span class="block w-6 h-px bg-white transition-all duration-300"
              [ngClass]="{'-rotate-45 -translate-y-2': mobileMenuOpen()}"></span>
      </button>

    </div>
  </div>

  <!-- Mobile Menu -->
  <div
    class="lg:hidden overflow-hidden transition-all duration-500"
    [ngClass]="{'max-h-screen opacity-100': mobileMenuOpen(), 'max-h-0 opacity-0': !mobileMenuOpen()}"
    style="background: rgba(10,10,10,0.97); backdrop-filter: blur(20px);">
    <nav class="flex flex-col px-4 py-4 sm:py-6 gap-2 border-t border-white/5">
      @for (item of navItems(); track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active-nav-mobile"
          class="flex items-center py-3 px-4 rounded-lg text-white/80 hover:text-white hover:bg-white/5 transition-all duration-200 tracking-wide"
          style="font-family: 'Inter', sans-serif;"
          (click)="closeMenu()">
          {{ item.label }}
        </a>
      }
      <div class="mt-4 pt-4 border-t border-white/10 flex flex-col gap-3">
        <!-- Mobile language switcher -->
        <div class="flex items-center justify-center gap-3 py-2">
          <button
            (click)="svc.setLang('uk')"
            class="px-3 py-1.5 rounded-full text-sm font-medium transition-all duration-200 border"
            [style.color]="svc.currentLang() === 'uk' ? '#d3af67' : 'rgba(255,255,255,0.5)'"
            [style.border-color]="svc.currentLang() === 'uk' ? '#d3af67' : 'rgba(255,255,255,0.1)'">
            UA
          </button>
          <button
            (click)="svc.setLang('en')"
            class="px-3 py-1.5 rounded-full text-sm font-medium transition-all duration-200 border"
            [style.color]="svc.currentLang() === 'en' ? '#d3af67' : 'rgba(255,255,255,0.5)'"
            [style.border-color]="svc.currentLang() === 'en' ? '#d3af67' : 'rgba(255,255,255,0.1)'">
            EN
          </button>
          <button
            (click)="svc.setLang('pl')"
            class="px-3 py-1.5 rounded-full text-sm font-medium transition-all duration-200 border"
            [style.color]="svc.currentLang() === 'pl' ? '#d3af67' : 'rgba(255,255,255,0.5)'"
            [style.border-color]="svc.currentLang() === 'pl' ? '#d3af67' : 'rgba(255,255,255,0.1)'">
            PL
          </button>
        </div>
        <a href="tel:+380384991652" class="text-center py-3 font-medium" style="color: #d3af67;">
          +380384991652
        </a>
        <a routerLink="/numbers" class="btn-gold text-center justify-center" (click)="closeMenu()">
          {{ 'nav.bookBtn' | translate }}
        </a>
      </div>
    </nav>
  </div>

</header>
